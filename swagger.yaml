openapi: 3.0.3
info:
  title: Rent & Flatmate Finder API
  description: REST API specification for the Rent & Flatmate Finder platform. Supports secure room listings, lifestyle profile matches, and real-time Socket.IO chat.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - role
              properties:
                name:
                  type: string
                  example: Alex Mercer
                email:
                  type: string
                  format: email
                  example: alex@example.com
                password:
                  type: string
                  format: password
                  example: password123
                role:
                  type: string
                  enum: [tenant, owner, admin]
                  example: tenant
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error or user already exists

  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: alex@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid email or password
        '403':
          description: Account is deactivated

  /profile:
    post:
      summary: Save or update unified profile details
      tags:
        - Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized

  /profile/{userId}:
    get:
      summary: Fetch public/self profile details
      tags:
        - Profile
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            example: 60d5f15c72c1c61864a78c10
      responses:
        '200':
          description: Detailed profile returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  profile:
                    $ref: '#/components/schemas/Profile'
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  reviewsStats:
                    type: object
                    properties:
                      averageRating:
                        type: number
                        example: 4.5
                      totalReviews:
                        type: integer
                        example: 2
        '401':
          description: Unauthorized
        '404':
          description: Profile not found

  /tenants/profile:
    get:
      summary: Fetch current tenant profile
      tags:
        - Profile (Tenant Specific)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant profile returned
        '401':
          description: Unauthorized
    post:
      summary: Create or replace tenant profile
      tags:
        - Profile (Tenant Specific)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
      responses:
        '200':
          description: Tenant profile created/replaced

  /listings:
    get:
      summary: Browse and search listings (with tenant compatibility scoring)
      tags:
        - Listings
      security:
        - bearerAuth: []
      parameters:
        - name: location
          in: query
          required: false
          schema:
            type: string
            example: Baner, Pune
        - name: minRent
          in: query
          required: false
          schema:
            type: number
            example: 8000
        - name: maxRent
          in: query
          required: false
          schema:
            type: number
            example: 15000
        - name: roomType
          in: query
          required: false
          schema:
            type: string
            enum: [single, shared, 1bhk, 2bhk, other]
            example: single
        - name: furnishing
          in: query
          required: false
          schema:
            type: string
            enum: [furnished, semi-furnished, unfurnished]
            example: furnished
      responses:
        '200':
          description: List of properties matching filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranked:
                    type: boolean
                    example: true
                  listings:
                    type: array
                    items:
                      type: object
                      properties:
                        listing:
                          $ref: '#/components/schemas/Listing'
                        compatibility:
                          $ref: '#/components/schemas/Compatibility'
    post:
      summary: Create a new listing
      tags:
        - Listings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreate'
      responses:
        '201':
          description: Listing created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '401':
          description: Unauthorized

  /listings/my:
    get:
      summary: Get owner's listings
      tags:
        - Listings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of listings owned by authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Listing'

  /listings/{id}:
    get:
      summary: Get listing by ID
      tags:
        - Listings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 60d5f2fc72c1c61864a78c22
      responses:
        '200':
          description: Listing details with compatibility analytics
        '404':
          description: Listing not found
    put:
      summary: Update listing details
      tags:
        - Listings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingCreate'
      responses:
        '200':
          description: Listing updated successfully
    delete:
      summary: Delete listing
      tags:
        - Listings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Listing deleted successfully

  /listings/{id}/fill:
    put:
      summary: Mark listing as filled
      tags:
        - Listings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Listing updated with status filled

  /reviews:
    post:
      summary: Submit a landlord review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ownerId
                - rating
                - reviewText
              properties:
                ownerId:
                  type: string
                  example: 60d5f15c72c1c61864a78c15
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                reviewText:
                  type: string
                  example: Great host, very responsive.
      responses:
        '201':
          description: Review created

  /interest:
    post:
      summary: Express interest in a property listing
      tags:
        - Interest Requests
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - listingId
              properties:
                listingId:
                  type: string
                  example: 60d5f2fc72c1c61864a78c22
      responses:
        '201':
          description: Interest expressed successfully

  /interest/received:
    get:
      summary: View received interest requests (Owner only)
      tags:
        - Interest Requests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of received requests

  /interest/sent:
    get:
      summary: View sent interest requests (Tenant only)
      tags:
        - Interest Requests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of sent requests

  /interest/{id}:
    put:
      summary: Accept or decline interest request
      tags:
        - Interest Requests
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [accepted, declined]
                  example: accepted
      responses:
        '200':
          description: Interest request status updated

  /messages/conversations:
    get:
      summary: Fetch list of active conversations
      tags:
        - Chat & Messages
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of active chat threads

  /messages/conversation/{conversationId}:
    get:
      summary: Fetch paginated messages in a conversation thread
      tags:
        - Chat & Messages
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of chronological messages

  /messages/{listingId}:
    get:
      summary: Fetch messages by listing (Legacy / Owner active chat load)
      tags:
        - Chat & Messages
      security:
        - bearerAuth: []
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: receiverId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat history messages list

  /saved:
    get:
      summary: Fetch tenant's bookmarked properties
      tags:
        - Saved Properties
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of bookmarked listings

  /saved/toggle:
    post:
      summary: Toggle bookmark save state on listing
      tags:
        - Saved Properties
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - listingId
              properties:
                listingId:
                  type: string
      responses:
        '200':
          description: Added or removed listing successfully

  /admin/users:
    get:
      summary: List all user profiles
      tags:
        - Admin Panel
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Platform users registry list

  /admin/users/{id}:
    delete:
      summary: Hard delete user account
      tags:
        - Admin Panel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully

  /admin/listings:
    get:
      summary: List all active listings
      tags:
        - Admin Panel
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Database properties list

  /admin/listings/{id}:
    delete:
      summary: Hard delete listing
      tags:
        - Admin Panel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Listing deleted successfully

  /admin/stats:
    get:
      summary: Get platform aggregate statistics
      tags:
        - Admin Panel
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Admin dashboard telemetry statistics counter metrics

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: 60d5f15c72c1c61864a78c10
        name:
          type: string
          example: Alex Mercer
        email:
          type: string
          format: email
          example: alex@example.com
        role:
          type: string
          enum: [tenant, owner, admin]
          example: tenant

    Profile:
      type: object
      properties:
        tenantId:
          type: string
        preferredLocation:
          type: string
          example: Baner, Pune
        budgetMin:
          type: number
          example: 8000
        budgetMax:
          type: number
          example: 15000
        moveInDate:
          type: string
          format: date-time
        preferredRoomType:
          type: string
        preferredFurnishing:
          type: string
        bio:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        coverImageUrl:
          type: string
        locationCoords:
          type: object
          properties:
            type:
              type: string
              example: Point
            coordinates:
              type: array
              items:
                type: number
              example: [73.7898, 18.5597]

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        bio:
          type: string
        preferredLocation:
          type: string
        budgetMin:
          type: number
        budgetMax:
          type: number
        moveInDate:
          type: string
        preferredRoomType:
          type: string
        preferredFurnishing:
          type: string
        locationCoords:
          type: object
          properties:
            type:
              type: string
              example: Point
            coordinates:
              type: array
              items:
                type: number
              example: [73.7898, 18.5597]

    Listing:
      type: object
      properties:
        _id:
          type: string
        ownerId:
          type: string
        title:
          type: string
        rent:
          type: number
        location:
          type: string
        availableFrom:
          type: string
        roomType:
          type: string
        furnishing:
          type: string
        description:
          type: string
        societyName:
          type: string
        area:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        status:
          type: string
        photos:
          type: array
          items:
            type: string
        locationCoords:
          type: object
          properties:
            type:
              type: string
            coordinates:
              type: array
              items:
                type: number

    ListingCreate:
      type: object
      required:
        - title
        - location
        - rent
        - roomType
        - furnishing
      properties:
        title:
          type: string
        location:
          type: string
        rent:
          type: number
        availableFrom:
          type: string
        roomType:
          type: string
        furnishing:
          type: string
        description:
          type: string
        societyName:
          type: string
        area:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        locationCoords:
          type: object
          properties:
            type:
              type: string
              example: Point
            coordinates:
              type: array
              items:
                type: number

    Compatibility:
      type: object
      properties:
        score:
          type: integer
          example: 92
        badge:
          type: string
          example: Excellent
        explanation:
          type: string
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        summary:
          type: string

    Review:
      type: object
      properties:
        _id:
          type: string
        ownerId:
          type: string
        tenantId:
          type: string
        rating:
          type: integer
        reviewText:
          type: string
        createdAt:
          type: string
